name: Build UDPProxyChanger
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - name: Install UPX
        run: |
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx
        shell: pwsh
      - run: pyinstaller --onefile --windowed --name UDPProxyChanger --upx-dir upx/upx-4.2.4-win64 udp_proxy_changer.py
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/UDPProxyChanger.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
